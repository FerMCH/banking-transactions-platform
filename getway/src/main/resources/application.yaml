server:
  port: ${SERVER_PORT}

fallbacks:
  account: ${ACCOUNT_FELLBACK}

spring:
  application:
    name: getway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: ${ACCOUNT_ID}
              uri: ${ACCOUNT_API}
              predicates:
                - Path=/api/bank/**
              filters:
                - StripPrefix=2
                - PrefixPath=/v2/account
                - name: CircuitBreaker
                  args:
                    name: accountCB
                    fallbackUri: forward:${ACCOUNT_FELLBACK}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ISSUER_URI}
          jwk-set-uri: ${JWK_URI}

resilience4j:
  circuitbreaker:
    instances:
      accountCB:
        register-health-indicator: true
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  timelimiter:
    instances:
      accountCB:
        timeout-duration: 4s
